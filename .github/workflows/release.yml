name: release

# semantic-release reads commit messages on main, derives the next
# version per conventional commits, updates CHANGELOG.md + package.json,
# commits + tags, and triggers the existing publish.yml on the tag.
#
# Why npmPublish=false in .releaserc.json: publish.yml handles npm via
# Trusted Publishing (OIDC). semantic-release just tags; publish.yml ships.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Skip when the most recent commit IS the release commit (avoid loops)
    if: "!contains(github.event.head_commit.message, 'chore(release):')"
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx --yes semantic-release \
            -p semantic-release \
            -p @semantic-release/changelog \
            -p @semantic-release/git \
            -p conventional-changelog-conventionalcommits

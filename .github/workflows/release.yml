name: release

# semantic-release reads commit messages on main, derives the next
# version per conventional commits, updates CHANGELOG.md + package.json,
# commits + tags, and triggers the existing publish.yml on the tag.
#
# Why npmPublish=false in .releaserc.json: publish.yml handles npm via
# Trusted Publishing (OIDC). semantic-release just tags; publish.yml ships.

# MANUAL TRIGGER ONLY. Running this workflow creates a version tag, which
# triggers publish.yml to ship to npm (IRREVERSIBLE). It is intentionally
# gated behind workflow_dispatch so merging changes never auto-publishes.
#
# To restore automatic release-on-merge, re-add the push trigger:
#   on:
#     push:
#       branches: [main]
#     workflow_dispatch:
on:
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Skip when the most recent commit IS the release commit (avoid loops)
    if: "!contains(github.event.head_commit.message, 'chore(release):')"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # All plugins (incl. commit-analyzer, release-notes-generator, npm,
        # github) and the conventionalcommits preset are pinned in
        # devDependencies and installed by `npm ci`, so they resolve from
        # the local node_modules. Do NOT use `npx --yes ... -p` here: that
        # installed only a subset into an isolated cache that semantic-release
        # could not resolve, causing "Cannot find module" failures.
        run: npx semantic-release
